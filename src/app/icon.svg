<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="circle">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <!-- Blue background -->
    <rect width="100" height="100" fill="#012169"/>
    <!-- White diagonals -->
    <line x1="0" y1="0" x2="100" y2="100" stroke="white" stroke-width="20"/>
    <line x1="100" y1="0" x2="0" y2="100" stroke="white" stroke-width="20"/>
    <!-- Red diagonals -->
    <line x1="0" y1="0" x2="100" y2="100" stroke="#C8102E" stroke-width="12"/>
    <line x1="100" y1="0" x2="0" y2="100" stroke="#C8102E" stroke-width="12"/>
    <!-- White cross -->
    <rect x="40" y="0" width="20" height="100" fill="white"/>
    <rect x="0" y="40" width="100" height="20" fill="white"/>
    <!-- Red cross -->
    <rect x="43" y="0" width="14" height="100" fill="#C8102E"/>
    <rect x="0" y="43" width="100" height="14" fill="#C8102E"/>
  </g>
</svg>
